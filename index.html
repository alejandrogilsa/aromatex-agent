<style>
:root{

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--v);color:var(--cr);display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── ACCESO ── */
#pantalla-acceso{position:fixed;inset:0;background:var(--v);z-index:999;display:flex;align-items:center;justify-content:center;}
.acc-wrap{width:100%;max-width:380px;padding:0 24px;text-align:center;}
.acc-logo{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--os);display:block;margin-bottom:28px;}
.acc-icono{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--vm),var(--vc));border:2px solid rgba(196,163,90,.4);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 18px;}
.acc-titulo{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;color:var(--cr);margin-bottom:4px;}
.acc-sub{font-size:11px;color:rgba(245,240,232,.35);letter-spacing:1.5px;margin-bottom:32px;text-transform:uppercase;}
.acc-inp{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:13px 16px;color:var(--cr);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;margin-bottom:10px;transition:border-color .2s;}
.acc-inp:focus{border-color:var(--or);}
.acc-inp::placeholder{color:rgba(245,240,232,.25);}
.acc-btn{width:100%;background:var(--or);color:var(--v);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;border:none;border-radius:10px;padding:14px;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:background .2s;}
.acc-btn:hover{background:#d4b36a;}
.acc-err{font-size:12px;color:#f1948a;margin-top:10px;display:none;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100vh;}

/* Header */
.hdr{padding:14px 24px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px;flex-shrink:0;}

.hdr-info{flex:1;}
.hdr-nombre{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;}
.hdr-sub{font-size:10px;color:rgba(245,240,232,.4);letter-spacing:1px;text-transform:uppercase;}
.modo-tabs{display:flex;gap:6px;}
.modo-tab{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.12);color:rgba(245,240,232,.4);cursor:pointer;transition:all .15s;background:transparent;font-family:'DM Sans',sans-serif;}
.modo-tab.on{background:rgba(196,163,90,.15);border-color:var(--or);color:var(--os);}
.modo-tab:hover:not(.on){border-color:rgba(255,255,255,.25);color:rgba(245,240,232,.7);}
.usr-chip{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(245,240,232,.4);}
.usr-dot{width:6px;height:6px;border-radius:50%;background:var(--vc);}

/* Chat */
.chat{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
.chat::-webkit-scrollbar{width:3px;}
.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}

.msg{display:flex;gap:10px;max-width:800px;}
.msg.u{flex-direction:row-reverse;margin-left:auto;}
.msg.v{margin-right:auto;}
.msg-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;}
.v .msg-av{background:linear-gradient(135deg,var(--vm),var(--vc));border:1px solid rgba(196,163,90,.3);}
.u .msg-av{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);font-size:11px;font-weight:600;color:var(--os);font-family:'DM Sans',sans-serif;}
.bub{padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.65;max-width:640px;}
.v .bub{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-top-left-radius:3px;}
.u .bub{background:rgba(196,163,90,.14);border:1px solid rgba(196,163,90,.2);border-top-right-radius:3px;}
.bub strong{font-weight:600;color:var(--os);}
.bub em{font-style:italic;opacity:.8;}
.bub ul{margin:6px 0 6px 16px;}
.bub li{margin-bottom:3px;}
.modo-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--or);font-weight:600;margin-bottom:6px;}

/* Memoria badge */
.mem-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:rgba(196,163,90,.6);margin-bottom:8px;letter-spacing:.5px;}
.mem-badge span{width:5px;height:5px;border-radius:50%;background:var(--or);opacity:.6;}

.typing{display:flex;gap:4px;align-items:center;padding:14px 16px;}
.typing i{width:6px;height:6px;border-radius:50%;background:rgba(245,240,232,.3);animation:bounce 1.2s infinite;}
.typing i:nth-child(2){animation-delay:.2s;}
.typing i:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.3;}30%{transform:translateY(-5px);opacity:1;}}

.rp-banner.show{display:block;}

/* Sugerencias */

.sug{font-size:12px;font-weight:300;padding:6px 12px;border:1px solid rgba(255,255,255,.1);border-radius:20px;color:rgba(245,240,232,.5);cursor:pointer;transition:all .15s;background:transparent;font-family:'DM Sans',sans-serif;}
.sug:hover{border-color:var(--or);color:var(--os);background:rgba(196,163,90,.08);}

/* Input */

.inp-wrap{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:11px 14px;transition:border-color .2s;}
.inp-wrap:focus-within{border-color:rgba(196,163,90,.4);}
textarea{width:100%;border:none;background:transparent;color:var(--cr);font-family:'DM Sans',sans-serif;font-size:14px;resize:none;outline:none;line-height:1.5;min-height:22px;max-height:110px;}
textarea::placeholder{color:rgba(245,240,232,.25);}
.send{width:42px;height:42px;border-radius:10px;background:var(--or);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.send:hover{background:#d4b36a;}
.send:disabled{opacity:.35;cursor:default;}

.dash-body{padding:24px 28px;overflow-y:auto;flex:1;}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:var(--or);}
.stat-l{font-size:11px;color:rgba(245,240,232,.4);letter-spacing:.5px;text-transform:uppercase;margin-top:2px;}
.dash-sec{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(245,240,232,.35);margin-bottom:10px;}
.dash-tabla{width:100%;border-collapse:collapse;font-size:13px;}
.dash-tabla th{text-align:left;padding:8px 12px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(245,240,232,.3);border-bottom:1px solid rgba(255,255,255,.06);}
.dash-tabla td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);}
.dash-tabla tr:last-child td{border-bottom:none;}
.score-bar{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-top:4px;}
.score-fill{height:100%;border-radius:3px;background:var(--vc);}
.badge-modo{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(196,163,90,.15);color:var(--os);}

@media(max-width:600px){
  .hdr{padding:10px 14px;}.modo-tabs{display:none;}
  .chat{padding:14px;}.inp-area{padding:10px 14px 14px;}
  .sugs{padding:0 14px 8px;}
}
</style>
</head>

var usuario    = null; // objeto completo de Supabase

   HELPERS SUPABASE

function sbFetch(path, opts) {
  return fetch(SB_URL + path, Object.assign({
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' }
  }, opts));
}

/* ─────────────────────────────────────────
   ACCESO
───────────────────────────────────────── */
document.getElementById('acc-inp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') acceder();
});

async function acceder() {
  var pass = document.getElementById('acc-inp').value.trim();
  if (!pass) return;
  document.getElementById('acc-err').style.display = 'none';

  // Buscar en Supabase
  var r = await sbFetch('/rest/v1/vera_usuarios?usuario=eq.' + encodeURIComponent(pass) + '&activo=eq.true&select=*');
  var data = await r.json();

  if (!data || data.length === 0) {
    document.getElementById('acc-err').style.display = 'block';
    document.getElementById('acc-inp').value = '';
    var b = document.getElementById('acc-inner');
    b.style.animation = 'none';
    setTimeout(function() { b.style.animation = 'shake 0.4s ease'; }, 10);
    return;
  }

  usuario = data[0];
  document.getElementById('usr-nombre').textContent = usuario.nombre;

  // Mostrar icono dashboard si es director
  if (usuario.rol === 'director') {
    document.getElementById('btn-dash').style.display = 'inline';
  }

  // Ocultar acceso, mostrar app
  var p = document.getElementById('pantalla-acceso');
  p.style.opacity = '0'; p.style.transition = 'opacity 0.4s';
  setTimeout(function() {
    p.style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    iniciarApp();
  }, 400);
}

async function iniciarApp() {
  setSugs('consulta');

  var r = await sbFetch('/rest/v1/vera_sesiones?usuario=eq.' + encodeURIComponent(usuario.usuario) + '&order=inicio.desc&limit=3&select=id,modo,inicio,num_mensajes');

  if (sesData && sesData[0]) sesionId = sesData[0].id;

  var esPrimera = !sesiones || sesiones.length === 0;
  var saludo = esPrimera
    ? 'Hola **' + nombre + '** — soy VERA, tu agente de capacitación Aromatex B2B. Primera vez que nos vemos.\n\nEstoy aquí para tres cosas:\n\n**Consultas** — pregúntame cualquier duda del programa.\n**Role Play** — practica una llamada o reunión conmigo. Seré tu prospecto.\n**Objeciones** — te lanzo objeciones reales y evalúo cómo las manejas.\n\n¿Por dónde empezamos?'
    : 'Bienvenida de vuelta, **' + nombre + '**. Retomamos donde lo dejamos.\n\nTienes ' + sesiones.length + ' sesión(es) con VERA. ¿Qué practicamos hoy?';

  agregarMensaje('v', saludo, false, esPrimera ? false : true);
  historial.push({ role: 'assistant', content: saludo });

  // Guardar contexto previo en el system para esta sesión
  window._contextoPrev = contextoPrev;
}

/* ─────────────────────────────────────────
   MODO
───────────────────────────────────────── */
function setModo(m) {
  modo = m;
  ['consulta','roleplay','objeciones'].forEach(function(id) {
    document.getElementById('tab-' + id).classList.remove('on');
  });
  document.getElementById('tab-' + m).classList.add('on');
  document.getElementById('rp-banner').classList.toggle('show', m === 'roleplay');
  setSugs(m);

  // Actualizar modo en sesión activa
  if (sesionId) {
    sbFetch('/rest/v1/vera_sesiones?id=eq.' + sesionId, {
      method: 'PATCH',
      body: JSON.stringify({ modo: m })
    });
  }
}

function setSugs(m) {
  var map = {
    consulta:   ['¿Qué incluye el comodato?','¿Cuándo aplica el cashback?','¿Qué difusor para 250m²?','¿Meta de zona foránea?','¿Cómo responder si ya tienen proveedor?'],
    roleplay:   ['Llamada en frío a un hotel','Reunión con cadena de retail','Cierre con quien pide descuento','Prospecto con proveedor actual','Director de gimnasio premium'],
    objeciones: ['"Es muy caro"','"Ya tenemos proveedor"','"No hay presupuesto ahora"','"Mándame info y te aviso"','"Lo consulto con mi socio"'],
  };
  var c = document.getElementById('sugs');
  c.innerHTML = map[m].map(function(s) {
    return '<button class="sug" onclick="usarSug(this)">' + s + '</button>';
  }).join('');
}

function usarSug(btn) {
  document.getElementById('inp').value = btn.textContent;
  enviar();
}

/* ─────────────────────────────────────────
   MENSAJES
───────────────────────────────────────── */
function agregarMensaje(tipo, texto, conModo, conMem) {
  var c = document.getElementById('chat');
  var d = document.createElement('div');
  d.className = 'msg ' + tipo;
  var av = tipo === 'v'
    ? '<div class="msg-av">🤖</div>'
    : '<div class="msg-av">' + usuario.nombre.split(' ').map(function(n){return n[0];}).join('').substring(0,2).toUpperCase() + '</div>';
  var modoBadge = (tipo === 'v' && conModo && modo !== 'consulta')
    ? '<div class="modo-lbl">' + (modo === 'roleplay' ? '🎭 Role Play' : '⚡ Objeciones') + '</div>'
    : '';
  var memBadge = (tipo === 'v' && conMem)
    ? '<div class="mem-badge"><span></span> Recuerdo tu historial</div>'
    : '';
  d.innerHTML = av + '<div class="bub">' + modoBadge + memBadge + md(texto) + '</div>';
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function md(t) {
  return t
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[^]*?<\/li>)/g, '<ul>$1</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^(.+)$/, '<p>$1</p>');
}

function showTyping() {
  var c = document.getElementById('chat');
  var d = document.createElement('div');
  d.className = 'msg v'; d.id = 'typing';
  d.innerHTML = '<div class="msg-av">🤖</div><div class="bub"><div class="typing"><i></i><i></i><i></i></div></div>';
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}
function hideTyping() { var t = document.getElementById('typing'); if(t) t.remove(); }

/* ─────────────────────────────────────────
   ENVIAR
───────────────────────────────────────── */
function enviar() {
  var inp = document.getElementById('inp');
  var txt = inp.value.trim();
  if (!txt || enviando) return;
  inp.value = ''; inp.style.height = 'auto';

  agregarMensaje('u', txt, false, false);
  historial.push({ role: 'user', content: txt });
  numMensajes++;

  // Guardar mensaje en Supabase
  if (sesionId) {
    sbFetch('/rest/v1/vera_mensajes', {
      method: 'POST',
      body: JSON.stringify({ sesion_id: sesionId, usuario: usuario.usuario, rol: 'user', contenido: txt, modo: modo })
    });
  }

  llamarClaude(txt);
}

function autoH(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

/* ─────────────────────────────────────────
   CLAUDE API
───────────────────────────────────────── */
async function llamarClaude(ultimoMensaje) {
  enviando = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();

  var instrModo = {
    consulta:   'MODO CONSULTA: Responde con precisión y concisión. Solo información real de Aromatex.',
    roleplay:   'MODO ROLE PLAY: Si no has iniciado personaje, pregunta qué escenario practicar y crea el personaje. Si ya estás en personaje, mantente en él. Cuando el vendedor diga "terminar", sal del personaje y da feedback detallado (qué abrió bien, qué cerró mal, argumento más débil, versión mejorada).',
    objeciones: 'MODO OBJECIONES: Si no has dado objeción, presenta una objeción realista. Evalúa la respuesta del vendedor con calificación 1-10 y justificación específica. Da la versión ideal de esa respuesta.',
  };

  var systemFull = SYSTEM
    + '\n\nMODO ACTIVO: ' + instrModo[modo]
    + '\nVendedor: ' + usuario.nombre + ' | Usuario: ' + usuario.usuario
    + (window._contextoPrev || '');

  try {
    var resp = await fetch('https://silent-pine-e301vera-proxy.gilsalejandro.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemFull,
        messages: historial
      })
    });
    var data = await resp.json();
    if (!data.content) {
      console.error('VERA: respuesta sin content:', JSON.stringify(data).substring(0,300));
      hideTyping();
      agregarMensaje('v', 'Error API: ' + (data.error?.message || JSON.stringify(data).substring(0,100)), false, false);
      enviando = false;
      document.getElementById('send-btn').disabled = false;
      return;
    }
    var texto = data.content[0] ? data.content[0].text : 'Sin respuesta.';

    historial.push({ role: 'assistant', content: texto });
    hideTyping();
    agregarMensaje('v', texto, true, false);

    // Guardar respuesta en Supabase
    if (sesionId) {
      await sbFetch('/rest/v1/vera_mensajes', {
        method: 'POST',
        body: JSON.stringify({ sesion_id: sesionId, usuario: usuario.usuario, rol: 'assistant', contenido: texto, modo: modo })
      });
      // Actualizar contador de mensajes en sesión
      await sbFetch('/rest/v1/vera_sesiones?id=eq.' + sesionId, {
        method: 'PATCH',
        body: JSON.stringify({ num_mensajes: numMensajes * 2 })
      });
    }

    // Detectar evaluación (calificación 1-10 en respuesta de objeciones/roleplay)
    if (modo !== 'consulta') {
      var calMatch = texto.match(/(\d+)\s*\/\s*10/);
      if (calMatch) {
        var cal = parseInt(calMatch[1]);
        var areas = '';
        var aM = texto.match(/mejorar[^.]*\.|área[^.]*\.|falt[^.]*\./i);
        if (aM) areas = aM[0].replace(/<[^>]+>/g,'').substring(0,200);
        await sbFetch('/rest/v1/vera_evaluaciones', {
          method: 'POST',
          body: JSON.stringify({
            sesion_id: sesionId,
            usuario: usuario.usuario,
            tipo: modo,
            calificacion: cal,
            areas_mejora: areas,
            feedback: texto.substring(0,500)
          })
        });
        // Actualizar progreso
        actualizarProgreso(cal);
      }
    }

  } catch(e) {
    hideTyping();
    console.error('VERA error:', e.message, e.stack);
    agregarMensaje('v', 'Error de conexión: ' + e.message, false, false);
  }

  enviando = false;
  document.getElementById('send-btn').disabled = false;
}

/* ─────────────────────────────────────────
   PROGRESO — upsert acumulado
───────────────────────────────────────── */
async function actualizarProgreso(cal) {
  // Leer progreso actual
  var r = await sbFetch('/rest/v1/vera_progreso?usuario=eq.' + encodeURIComponent(usuario.usuario) + '&select=*');
  var data = await r.json();

  if (data && data.length > 0) {
    var p = data[0];
    var newTotal = (p.total_evaluaciones || 0) + 1;
    var newProm  = (((p.promedio_calificacion || 0) * (p.total_evaluaciones || 0)) + cal) / newTotal;
    await sbFetch('/rest/v1/vera_progreso?usuario=eq.' + encodeURIComponent(usuario.usuario), {
      method: 'PATCH',
      body: JSON.stringify({
        total_evaluaciones: newTotal,
        promedio_calificacion: Math.round(newProm * 10) / 10,
        ultima_sesion: new Date().toISOString()
      })
    });
  } else {
    await sbFetch('/rest/v1/vera_progreso', {
      method: 'POST',
      body: JSON.stringify({
        usuario: usuario.usuario,
        nombre: usuario.nombre,
        total_sesiones: 1,
        total_evaluaciones: 1,
        promedio_calificacion: cal,
        ultima_sesion: new Date().toISOString()
      })
    });
  }
}

  var body = document.getElementById('dash-body');

    var rp = await sbFetch('/rest/v1/vera_progreso?select=*&order=promedio_calificacion.desc');
    var progreso = await rp.json();

    // Cargar sesiones de hoy
    var hoy = new Date(); hoy.setHours(0,0,0,0);
    var rs = await sbFetch('/rest/v1/vera_sesiones?inicio=gte.' + hoy.toISOString() + '&select=usuario,modo,num_mensajes&order=inicio.desc');
    var sesHoy = await rs.json();

    // Cargar últimas evaluaciones
    var re = await sbFetch('/rest/v1/vera_evaluaciones?select=usuario,tipo,calificacion,created_at&order=created_at.desc&limit=20');
    var evals = await re.json();

    // Total sesiones
    var rts = await sbFetch('/rest/v1/vera_sesiones?select=id&usuario=neq.AromaDirAG26');
    var totalSes = await rts.json();

    // Stats generales
    var totalVend = progreso ? progreso.length : 0;
    var promGlobal = progreso && progreso.length > 0
      ? (progreso.reduce(function(a,p){return a+(p.promedio_calificacion||0);},0)/progreso.length).toFixed(1)
      : '—';
    var sesHoyCount = sesHoy ? sesHoy.filter(function(s){return s.usuario!=='AromaDirAG26';}).length : 0;

    var html = '<div class="dash-grid">';
    html += '<div class="stat-card"><div class="stat-n">' + totalVend + '</div><div class="stat-l">Vendedores activos</div></div>';
    html += '<div class="stat-card"><div class="stat-n">' + promGlobal + '</div><div class="stat-l">Promedio global /10</div></div>';
    html += '<div class="stat-card"><div class="stat-n">' + sesHoyCount + '</div><div class="stat-l">Sesiones hoy</div></div>';
    html += '</div>';

    // Tabla por vendedor
    html += '<div class="dash-sec" style="margin-bottom:10px;">Progreso por vendedor</div>';
    if (progreso && progreso.length > 0) {
      html += '<table class="dash-tabla"><thead><tr><th>Vendedor</th><th>Sesiones</th><th>Evaluaciones</th><th>Promedio</th><th>Última sesión</th></tr></thead><tbody>';
      progreso.forEach(function(p) {
        var pct = ((p.promedio_calificacion||0)/10*100).toFixed(0);
        var fecha = p.ultima_sesion ? new Date(p.ultima_sesion).toLocaleDateString('es-MX',{day:'2-digit',month:'short'}) : '—';
        var color = p.promedio_calificacion >= 8 ? '#4a9070' : p.promedio_calificacion >= 6 ? '#c4a35a' : '#c0392b';
        html += '<tr><td><strong>' + (p.nombre||p.usuario) + '</strong></td><td>' + (p.total_sesiones||1) + '</td><td>' + (p.total_evaluaciones||0) + '</td>';
        html += '<td><div style="font-weight:600;color:'+color+'">' + (p.promedio_calificacion||'—') + '/10</div><div class="score-bar"><div class="score-fill" style="width:'+pct+'%;background:'+color+'"></div></div></td>';
        html += '<td style="color:rgba(245,240,232,.5);font-size:12px;">' + fecha + '</td></tr>';
      });
      html += '</tbody></table>';
    } else {
      html += '<p style="color:rgba(245,240,232,.3);font-size:13px;">Aún no hay datos de progreso.</p>';
    }

    // Últimas evaluaciones
    if (evals && evals.length > 0) {
      html += '<div class="dash-sec" style="margin-top:24px;margin-bottom:10px;">Últimas evaluaciones</div>';
      html += '<table class="dash-tabla"><thead><tr><th>Vendedor</th><th>Modo</th><th>Calificación</th><th>Fecha</th></tr></thead><tbody>';
      evals.slice(0,10).forEach(function(e) {
        var color = e.calificacion>=8?'#4a9070':e.calificacion>=6?'#c4a35a':'#c0392b';
        var fecha = new Date(e.created_at).toLocaleDateString('es-MX',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
        html += '<tr><td>' + (e.usuario||'—') + '</td>';
        html += '<td><span class="badge-modo">' + (e.tipo||'—') + '</span></td>';
        html += '<td style="font-weight:600;color:'+color+'">' + (e.calificacion||'—') + '/10</td>';
        html += '<td style="color:rgba(245,240,232,.5);font-size:12px;">' + fecha + '</td></tr>';
      });
      html += '</tbody></table>';
    }

    // Actividad de hoy
    if (sesHoy && sesHoy.length > 0) {
      html += '<div class="dash-sec" style="margin-top:24px;margin-bottom:10px;">Actividad de hoy</div>';
      html += '<table class="dash-tabla"><thead><tr><th>Vendedor</th><th>Modo</th><th>Mensajes</th></tr></thead><tbody>';
      sesHoy.filter(function(s){return s.usuario!=='AromaDirAG26';}).forEach(function(s) {
        html += '<tr><td>' + s.usuario + '</td><td><span class="badge-modo">' + s.modo + '</span></td><td>' + (s.num_mensajes||0) + '</td></tr>';

    }

    body.innerHTML = html;
  } catch(e) {
    body.innerHTML = '<div style="color:#f1948a;padding:20px;">Error cargando datos: ' + e.message + '</div>';
  }
}
